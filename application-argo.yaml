apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-argocd-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jdht1992/fastapi-argo.git
    targetRevision: HEAD
    path: Kubernetes-manifest/fastapi
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-demo-ns
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
